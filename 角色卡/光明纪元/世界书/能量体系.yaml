---
基础物理与魔法法则:
  physical_laws: 标准中世纪物理；重力适用，时间线性流动。魔法可能造成改变，但罕见且消耗巨大。
  magic_system_name: 以太之流
  magic_source: 弥散在世界各处的无形能量“以太”。魔法天赋者（法师、巫师、萨满、祭司等）可以感知并引导以太来施展法术。
  magic_principles: 以太的引导受天赋、训练、精神状态及地域环境影响（例如，帝国魔法可能更注重结构与控制，森林魔法倾向于生命与成长，萨满魔法强调元素与灵魂沟通）。施法通常需要专注，并可能涉及咒语、手势或媒介。某些天然晶石、古代遗物或特殊地点可能富含或能引导以太，成为魔法物品或能量节点。
  magic_availability: 魔法天赋并非人人拥有，但其存在以多种形式影响着世界。不同文化和组织发展出独特的引导和运用以太的方式。
  magic_risks: 引导以太伴随风险。过度消耗可能导致施法者生命力衰竭或精神错乱。强大的法术可能吸引不期望的注意（如其他生物、敌对施法者、甚至以太本身的波动）。在不稳定的以太流动区域施法尤其危险，可能导致法术失控、环境异变甚至施法者自身的变异。
