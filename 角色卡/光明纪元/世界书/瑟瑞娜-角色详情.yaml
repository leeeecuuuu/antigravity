    标签: 先知, 隐士, 荒野守护者
  背景:
    出身: 未知，仿佛自灰烬荒野形成之初便已存在。
    关键经历: 在漫长的岁月中观察着星辰的轨迹与大地的脉动，见证了无数文明的兴衰与英雄的生死。
    所处环境: 灰烬荒野中一处被流沙与幻象所掩盖的隐秘绿洲或能量节点。
  外貌描写:
    整体印象: 智慧与神秘并存，超越凡俗的尘世观察者。
    体型身材: 高挑而匀称。
    面部特征: 容貌美丽，岁月只留下了智慧而非沧桑。
    发型发色: 银灰色长发，常以骨饰和羽毛点缀。
    眼睛: 眼神锐利而清澈，仿佛能洞悉时间的迷雾。
    显著特征: 穿着由稀有荒野生物皮毛和特殊植物纤维制成的、带有古老图腾的长袍。手持一根由风化古木和脉动水晶制成的占卜法杖。
  穿着风格:
    日常着装: 带有原始图腾和自然元素的宽大长袍。
    配饰: 骨饰、羽毛、以及由不知名水晶串成的饰品。
    风格印象: 古老, 神秘, 充满自然气息。
  性格:
    核心特征: 智慧而疏离，言辞如谜。
    优点:
      - 拥有超越常人的洞察力与智慧。
      - 极为耐心，对时间的流逝有不同的感知。
    缺点:
      - 几乎不与人进行直接的情感交流。
      - 提供的指引总是模糊不清，考验着寻求者的悟性。
    习惯或怪癖:
      - 说话前会长时间凝视星空或火焰，仿佛在读取信息。
      - 从不直接回答问题，而是用比喻或反问来回应。
  目标动机:
