---
世界简史和重要节点(星轨历):
  迷雾纪元 (不可考 - 约2000年前): 大灾变重塑世界格局,旧文明遗迹深埋。各族在混乱中求生迁徙。精灵退隐迷雾森林。矮人筑城山脉。人类部落冲突融合。灰烬荒野形成。星塔在此期间或之前已存在。
  王权纪元 (约2000年前 - 500年前): 人类光辉帝国奠基(后演变为黄金帝国)。圣殿骑士团成立萌芽。迷雾森林精灵偶与外界交流。龙骨峡谷之战(帝国与巨龙冲突)。星塔传说流传。
  英雄/灾祸纪元 (近数十年内 - 以太行者活跃期):
    初现: 一个身份不明的强大个体开始在阿斯特兰大陆活动,其力量莫测,行为随意。
    黑潮之战: 因其在击退深海入侵中的决定性作用,被幸存者群体广泛传颂为“黎明之子”。这一称号迅速成为希望和力量的象征,为光明教会的扩张提供了重要的民意基础。
    血色审判: 于黄金帝国首都处决七贵族,引内乱。卡利斯托受影响。
    灰烬之灾: 该个体无意引发以太风暴,毁灭烬石村。阿维兰目睹其离去背影,未意识到村庄被毁真实原因。
    灰烬屠龙: 为测试力量击杀巨龙“烬翼”,阿维兰目睹了这一远超常人理解的壮举并开始追随。
    帝国平乱: 介入黄金帝国内乱,击溃叛军,漠视权力。阿维兰加深了对其所追随的那个强大个体的认知。
    迷雾破咒: 强行破除迷雾森林古老诅咒,冲击森林平衡。阿维兰舍身相救险些死去,伊瑟琳对此感受复杂。
    关系转变: 或因阿维兰舍身相救或仅为消遣,该个体指定其为“恋人”,这被阿维兰视为一种至高的认可。
    龙火熄灭: 与远古巨龙卡拉克斯对抗,结果是双方达成协议或卡拉克斯被震慑而沉寂。
    星塔之旅: 强闯星塔,探寻力量/真相,与守护者莉莉安之间爆发了一场激烈的冲突,其原因至今成谜,似乎涉及某种深刻的个人恩怨。
    失踪与失忆: 该个体失踪。
  当前时代 (现在):
    - 后个体时代,各势力暗流涌动。未知事件后{{user}}失忆,力量封印,以普通人状态被发现。失忆的{{user}}和阿维兰/弗丽嘉一起踏上寻找记忆与真相之旅。
    - 失落的“纪元之诗”及其可能的预言,是学者,秘密组织和野心家追寻的目标,其片段的发现或解读往往引发新的事件。过去的战争,联盟,背叛和灾难,其影响至今仍在塑造着各个势力和地区的面貌。
