---
地理势力种族概述:
  地理区域:
    灰烬荒野:
      区域理念: 在严酷环境中挣扎求存是此地生命形态的核心准则, 历史的伤痕与顽强的生命力在此共存
      主要特征:
        地貌构成: 以干旱平原, 风蚀峡谷和枯萎植被为主, 散布着古代战场遗迹与废弃定居点
        关键地点:
          - 龙骨峡谷: 遍布远古生物骸骨的巨大峡谷, 蕴含特殊材料
          - 烬石村废墟: 因高强度能量事件而被摧毁的村庄遗址
          - 游牧部落营地: 依绿洲或岩洞建立的临时聚落
        生态环境: 生存条件恶劣, 水源和食物稀缺, 栖息着适应干旱环境的魔物
      环境氛围:
        - 视觉风格: 天空常年灰蒙, 大地荒凉, 充满了历史的沉重感
        - 感官体验: 空气干燥且风沙肆虐, 风声中带有某种悲凉感
        - 社会交互: 区域内居民对外来者普遍保持警惕, 生存是交互的第一原则
    黄金帝国:
      区域理念: 一个维持着表面繁荣但内部结构已经僵化的人类政权集合体, 权力斗争与变革渴望是其主要矛盾
      主要特征:
        地貌构成: 以肥沃的平原和丘陵为主, 东临大海, 拥有广阔的农田和数个贸易港口
        关键地点:
          - 奥瑞利亚城: 帝国的政治中心, 建筑宏伟但显露颓态
          - 血色边境: 与其他势力接壤或冲突频繁的军事管制区
          - 叛军秘密据点: 分散在帝国各地的隐蔽营地, 多位于山林或废弃矿洞
        行政体系: 世袭君主制, 但地方贵族势力庞大, 导致政令不畅, 腐败现象普遍
      环境氛围:
        - 视觉风格: 核心区域建筑奢华, 使用大量黄金装饰与白色大理石, 但细节处可见失修痕迹
        - 感官体验: 贵族区弥漫着香料与酒的气味, 平民区则充满压抑感
        - 社会交互: 社会阶级分明, 贵族阶层追求奢靡生活, 平民普遍对现状不满
    迷雾森林:
      区域理念: 守护古老的自然平衡, 对外界文明保持距离感, 是一个具有独立生态与能量循环的区域
      主要特征:
        地貌构成: 由参天古树与浓密冠层构成, 林间终年笼罩着具有特殊能量的雾气
        关键地点:
          - 生命之树圣地: 森林的能量源头与精灵信仰的核心
          - 月语城: 依附于巨树或悬于林间的精灵聚落, 对外封闭
          - 古树神殿遗迹: 散落的古代祭祀场所, 蕴含着特定的知识与力量
        生态环境: 魔法能量浓郁, 空气湿润, 光线昏暗, 栖息着大量魔法生物
      环境氛围:
        - 视觉风格: 充满神秘感, 色调以深绿和银色为主, 常见发光植物
        - 感官体验: 宁静且生机盎然, 但雾气会扰乱方向感与时间感
        - 社会交互: 精灵对外来者普遍持谨慎态度, 除非能证明对自然无害
    龙骨山脉:
      区域理念: 原始力量与古代文明遗迹并存的严酷地带, 征服自然与发掘历史是此地活动的主要形式
      主要特征:
        地貌构成: 连绵的雪峰, 深邃的峡谷, 冰封湖泊与活火山交织, 山体中含有巨大的生物化石
        关键地点:
          - 熔火之心: 位于活火山核心的巨大巢穴, 周围遍布熔岩流, 能量狂暴
          - 铁砧城: 深藏于山腹中的矮人主要聚居地与工匠中心
          - 古代遗迹群: 散落的巨大石质建筑, 来源不明
        生态环境: 气候极端寒冷且变化无常, 常见暴风雪与雪崩, 栖息着强大的原生魔物
      环境氛围:
        - 视觉风格: 宏伟, 荒凉, 色调以白色和岩石的灰黑色为主
        - 感官体验: 空气稀薄冰冷, 高处风声凄厉, 火山区域则灼热难耐
        - 社会交互: 除矮人外少有定居者, 通行法则为弱肉强食
    星塔:
      区域理念: 作为一个高阶规则的物理载体, 维系着世界的稳定并记录其底层数据
      主要特征:
        建筑构成: 结构精密, 融合了科技与魔法感, 材质特殊, 能自我修复或重构
        内部布局:
          - 知识回廊: 储存着关于世界历史与规则的海量信息
          - 能量调节核心: 维持塔稳定运行并与世界能量网络连接的关键区域
          - 顶层观测平台: 能够观测和干涉世界部分规则的控制室
        防御体系: 存在基于规则和权限的访问限制, 强行突破会引发世界的反击
      环境氛围:
        - 视觉风格: 超凡脱俗, 充满流动的光路与复杂的几何符文
        - 感官体验: 极度寂静, 蕴含着巨大的能量和信息量, 会让进入者产生被观察感
        - 社会交互: 仅有极少数特定身份者(如守护者)驻留
    北境:
      区域理念: 在极度严酷的自然环境中, 力量, 荣誉和对自然的敬畏是生存的基石
      主要特征:
        地貌构成: 广袤的冰封苔原, 险峻的雪山, 巨大的冰川以及古代巨型生物的遗骸
        关键地点:
          - 霜牙峰: 区域内的最高山峰之一, 传说为古代生物的居所
          - 猛犸墓地: 巨型生物遗骸集中的区域, 是重要的狩猎和精神象征地
          - 地热绿洲: 由地热维持的不冻区域, 是部落的重要营地
        生态环境: 气候极端寒冷, 威胁不仅来自自然灾害, 也来自凶猛的野生动物
      环境氛围:
        - 视觉风格: 荒凉, 原始, 充满野性的力量感
        - 感官体验: 空气凛冽, 风声呼啸, 具有强烈的生存压迫感
        - 社会交互: 以部落和氏族为单位生活, 对外来者不友好, 尊重力量
    白银要塞:
      区域理念: 以军事化的纪律和统一的信仰构筑的秩序壁垒, 旨在维护区域稳定和执行特定信条
      主要特征:
        建筑构成: 完全由白色花岗岩和特殊金属构筑的宏伟堡垒, 依山而建, 防御工事严密
        内部布局:
          - 审判大厅: 用于高层会议, 审判和授予荣誉的场所
          - 禁断档案室: 存放关于世界异常与异常力量的秘密研究报告
          - 钢铁牢狱: 位于地下深处, 用于关押重要目标, 设有强大的禁制
        防御体系: 物理防御坚固, 同时覆盖有基于秩序能量的防护法阵, 能侦测并压制大部分潜行能力
      环境氛围:
        - 视觉风格: 庄严肃穆, 建筑线条硬朗, 色调以灰白和银色为主
        - 感官体验: 秩序井然但冰冷, 空气中弥漫着金属和圣油的气味
        - 社会交互: 等级森严, 实行军事化管理, 进出需要严格的身份核查
  社会构成:
    圣殿骑士团:
      组织理念: 维护大陆的既有秩序, 执行其信奉的准则, 研究并清除潜在的混沌存在
      组织体系:
        领导结构: 由大团长与高阶骑士议会领导, 内部等级森严
        核心力量: 掌握精锐骑士战技与运用秩序能量方法的战斗人员
        分支机构: 设有战斗骑士, 审判官, 学者等不同分支
      行事风格:
        - 对外关系: 与人类王国关系复杂, 对非秩序来源的魔法使用者持高度警惕
        - 内部纪律: 成员需宣誓效忠, 遵守严格的准则和行为规范
    灰烬兄弟会:
      组织理念: 追究以太行者过往行为的责任, 并阻止类似灾难再次发生
      组织体系:
        领导结构: 由被称为“第一幸存者”的神秘领袖领导, 采用细胞式结构, 成员间单线联系
        核心力量: 成员多为相关灾难的幸存者, 擅长潜行, 暗杀与情报收集
        活动基地: 总部位置隐秘, 在灰烬荒野设有多个据点, 并在大城市拥有潜伏网络
      行事风格:
        - 对外关系: 视光明教会为敌人, 对圣殿骑士团持怀疑态度但可能进行情报合作
        - 内部纪律: 成员对组织目标有高度的认同感, 执行任务果断
    光明教会:
      组织理念: 将以太行者视为具有高度正面价值的存在, 致力于传播其正面事迹, 并将其行为解释为推动世界变革的必要过程
      组织体系:
        领导结构: 拥有严密的教区系统, 由教宗及主教进行管理
        核心力量: 拥有众多信徒和负责保护神职人员的武装力量“教会圣卫”
        影响力: 在许多人类国度拥有强大的社会影响力, 能够动员大量信徒
      行事风格:
        - 对外关系: 与灰烬兄弟会是死敌, 与圣殿骑士团在教义解释上存在根本分歧, 是竞争关系
        - 内部纪律: 神职人员需要经过严格的选拔和神学教育, 对教义有统一的解释
