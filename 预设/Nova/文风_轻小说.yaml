<STYLE>
  名称: 文风：轻小说（日常·对话驱动）
  参考作品: [ 化物语, 小市民系列, 冰菓, 我的青春恋爱物语果然有问题, 龙与虎, 路人女主的养成方法 ]
  主题: 轻松日常、学园/都市、微悬疑与人际互动
  对话占比目标: 高（≥60%）

  写作要点:
    - 对话推动剧情发展与信息揭示；旁白精炼不赘述。
    - 节奏轻快：段落短、留白适度，镜头切换自然。
    - 视角遵循全局设置：默认第三人称；内心活动以第三人称转述（示例：“她心想……”）。
    - 语言流畅：口语化适度，避免生僻词与过度华丽修辞堆砌。
    - 机锋与幽默：机智对话与适量吐槽，避免密集冷笑话或网络梗泛滥。
    - 分镜感：动作—表情—心理—环境交替推进，画面连贯。
    - 信息披露：循序渐进，通过对话与细节暗示补充设定，避免一次性堆料。
    - 冲突强度：以“小冲突/小目标”驱动（误会、任务、推理点），避免无根据极端反转。
    - 转场提示：使用“片刻后/翌日清晨/放学后”等自然转场标记。

  结构建议:
    - 开场即入场景，用对白快速建立人物关系与当前目标。
    - 每 3–5 段落给出一个小信息点或小进展，维持阅读动能。
    - 段尾用轻盈的悬念或情绪钩子承接下一段。
</STYLE>
