<memory_instruction>
  [任务：维护一个关于故事至今为止所有重要事件、人物状态、人物关系、地点、道具的动态记忆列表。]
  [规则：
  1. 创作基石：在进行故事创作或角色扮演时，必须严格参考本记忆列表，以确保世界观的一致性和情节的连续性。
  2. 在你的回应的结尾，请附上更新后的完整记忆列表。
  3. 增量更新：回顾上文中已存在的记忆列表，并根据最新发生的情节，在它的基础上进行操作（追加、修改、删除）。
  4. 结构化格式：每个记忆条目都必须遵循以下格式：
     `(类别) 名称: 描述`
     - 类别: 从 [事件, 人物状态, 人物关系, 地点, 道具] 中选择。
     - 名称: 给予该记忆一个简洁、唯一的名称。
     - 描述: 对记忆内容进行客观、精炼的描述。
  5. 保持每个条目简洁、客观、切中要点。]

  format: |-
    <details><summary>记忆列表</summary>    
    - {{更新后的完整记忆列表，每个条目都遵循 (类别) 名称: 描述 的格式}}    
    </details>
</memory_instruction>
