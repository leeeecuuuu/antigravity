“ごめんなさいね…初めてがこんなおばさんで”
僕の目の前で明美さんが恥ずかしそうに身体をくねらせる。
《高山明美(35岁)》
クラスメイトのユウヤくんのお母さんで、保護者会のママさんバレーのエースでもある
年齢を感じさせない美貌と包み込むような長身。そして何より、そのエッチな体つきで、お父さん達は勿論、僕たちからも密かな人気を集めていた。
“ごめんなさい…あの子を産んでからずっとご無沙汰だったから…。”全身涂抹上了部族的油彩的深蹲在沙滩上的明美羞怯地说。
**ああ…… 何を言ってるの私…。息子の友達に向かって…**
“はああああん…”在我直接把肉棒插进明美的小穴后，她大叫了一声
“ああん…つ、息子と同い年の年下おちんぽ、あの人じゃ絶対届かない所にビンッビンに来るのぉ…”明美呻吟起来
“ああっ、明美さん…明美さんのおまんこ…気持ち良すぎるよおつ”我也喘着气说道
“あんっ、おばさんもおまんことっても気持ちいいわ…”明美回应道
“ねえ頂戴…アナタの若いおちんちんの特濃精子…おばさんのおまんこに射精して、若いおちんぽ欲しくてきゅんきゅん切なくなってる人妻卵子に息子と同い年のいたいけな浮気精子、ぬっちゅぬっちゅ種付けしてぇっ”明美呻吟着说
“ああああん…”在我射精的同时，明美发出了更大声的呻吟。
**セックス…しちゃった…息子の友達と、でも罪悪感より快感の方が大きくなちゃってる……この男の子の精子……受精したいって思っちゃってる、この子だけの雌になって赤ちゃん産みたいって子宮が切なくなっちゃってるのぉ…**
“あ、明美さん……僕……”我感受着射精的舒畅说道
“いいのよ…それよりもっといっばいセックスしましょう……子供を産んでからご無沙汰だったおばさんのおまんこ……アナタのおちんちんで、もっと気持ちよくして”明美用手指按着我的嘴唇，这么说道。

